<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>紫微斗数 · 免费排盘与命盘解析</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/chart.css">
  <style>body { background: #f7f6f2 !important; color: #4a3f35; }</style>
  <script src="../js/cities.js"></script>
  <script src="../js/lunarCalendar.js"></script>
  <script src="../js/trueSolarTime.js"></script>
</head>
<body>

<header class="navbar">
  <div class="nav-inner">
    <a href="../index.html" class="nav-logo"><span class="logo-star">☽</span> 紫微斗数</a>
    <nav class="nav-links">
      <a href="../index.html">首页</a>
      <a href="chart.html" class="active">免费排盘</a>
    </nav>
  </div>
</header>

<!-- ① 输入表单（Figma 风格） -->
<section id="form-section" class="nf-page">
  <header class="nf-header">
    <div class="nf-logo">
      <div class="nf-diamond"></div>
      <span>紫微排盘</span>
    </div>
    <button class="nf-history-btn" type="button">🕐 排盘记录</button>
  </header>

  <div class="nf-card">

    <!-- 姓名 & 性别 -->
    <div class="nf-row">
      <div class="nf-row-left">
        <span class="nf-label">姓名:</span>
        <input type="text" id="inp-name" placeholder="请输入姓名（选填）" class="nf-name-input" autocomplete="off">
      </div>
      <div class="nf-gender-pill">
        <button type="button" class="nf-gender-btn active" data-v="male">男</button>
        <button type="button" class="nf-gender-btn" data-v="female">女</button>
        <input type="hidden" id="inp-gender" value="male">
      </div>
    </div>

    <!-- 公历/农历切换 + 出生日期 -->
    <div class="nf-row" style="flex-direction:column;align-items:stretch;gap:10px">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div style="display:flex;align-items:center;gap:4px">
          <span class="nf-required">*</span>
          <span class="nf-label">出生时间</span>
        </div>
        <div class="nf-cal-toggle">
          <button type="button" class="nf-cal-btn active" data-cal="solar">公历</button>
          <button type="button" class="nf-cal-btn" data-cal="lunar">农历</button>
        </div>
      </div>

      <!-- 公历输入 -->
      <div id="solar-inputs" class="nf-date-inputs">
        <input type="number" id="inp-year" min="1900" max="2030" placeholder="年 如1990" class="nf-select" autocomplete="off" style="flex:2">
        <select id="inp-month" class="nf-select" style="flex:1.5">
          <option value="">月</option>
          <option value="1">1月</option><option value="2">2月</option><option value="3">3月</option>
          <option value="4">4月</option><option value="5">5月</option><option value="6">6月</option>
          <option value="7">7月</option><option value="8">8月</option><option value="9">9月</option>
          <option value="10">10月</option><option value="11">11月</option><option value="12">12月</option>
        </select>
        <select id="inp-day" class="nf-select" style="flex:1.5"><option value="">日</option></select>
      </div>

      <!-- 农历输入 -->
      <div id="lunar-inputs" class="nf-date-inputs" style="display:none">
        <input type="number" id="inp-lunar-year" min="1900" max="2030" placeholder="农历年 如1990" class="nf-select" autocomplete="off" style="flex:2">
        <select id="inp-lunar-month" class="nf-select" style="flex:1.5">
          <option value="">月</option>
          <option value="1">正月</option><option value="2">二月</option><option value="3">三月</option>
          <option value="4">四月</option><option value="5">五月</option><option value="6">六月</option>
          <option value="7">七月</option><option value="8">八月</option><option value="9">九月</option>
          <option value="10">十月</option><option value="11">十一月</option><option value="12">十二月</option>
        </select>
        <select id="inp-lunar-day" class="nf-select" style="flex:1.5">
          <option value="">日</option>
        </select>
        <div style="display:flex;gap:6px;flex:1.5;align-items:center">
          <label style="font-size:.78rem;color:#8e857d;white-space:nowrap">
            <input type="checkbox" id="inp-lunar-leap" style="margin-right:3px">闰月
          </label>
        </div>
      </div>

      <!-- 日期预览 -->
      <div id="date-preview" style="font-size:.8rem;color:#8e857d;min-height:18px;padding-left:2px"></div>
    </div>

    <!-- 出生时刻 -->
    <div class="nf-row nf-time-row">
      <div class="nf-time-label-group">
        <span class="nf-label">出生时刻</span>
        <label class="nf-unknown-time-label">
          <input type="checkbox" id="inp-time-unknown"> 时刻未知
        </label>
      </div>
      <input type="time" id="inp-time-val" class="nf-select nf-time-input" value="21:00">
    </div>
    <div id="tst-shichen-preview" class="nf-shichen-preview"></div>

    <!-- 出生地点 -->
    <div class="nf-row" style="flex-direction:column;align-items:stretch;gap:8px">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <span class="nf-label">出生地点</span>
        <span style="font-size:.75rem;color:#b0a89f">（影响真太阳时）</span>
      </div>
      <div style="position:relative">
        <input type="text" id="inp-city-search" placeholder="搜索城市，如：北京、深圳" class="nf-select" style="width:100%;padding-right:60px" autocomplete="off">
        <button type="button" id="btn-clear-city" style="position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;color:#b0a89f;cursor:pointer;font-size:.8rem;display:none">清除</button>
      </div>
      <div id="city-dropdown" class="nf-city-dropdown" style="display:none"></div>
      <div id="city-selected" style="font-size:.82rem;color:#6b4e41;display:none">
        已选: <span id="city-selected-name"></span>
        <span style="color:#b0a89f;margin-left:6px">(<span id="city-selected-lon"></span>°E, <span id="city-selected-lat"></span>°N)</span>
      </div>
    </div>

    <!-- 真太阳时显示 -->
    <div class="nf-row" style="flex-direction:column;align-items:stretch;gap:4px;border-bottom:none">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <span class="nf-label">真太阳时</span>
        <span id="tst-estimated-badge" style="font-size:.72rem;color:#c08060;background:#fff3ec;border:1px solid #f0d0b8;border-radius:4px;padding:1px 6px;display:none">默认估算</span>
      </div>
      <div id="tst-display" style="font-size:.82rem;color:#8e857d">请先输入出生时间和地点</div>
    </div>

    <!-- 错误提示 -->
    <div id="form-error" class="nf-error" style="display:none"></div>

    <!-- 提交按钮 -->
    <div class="nf-submit-wrap">
      <button type="button" class="nf-submit" id="btn-submit">
        <span id="btn-text">开 始 排 盘</span>
        <span id="btn-loading" style="display:none">排盘中…</span>
      </button>
    </div>
    <p style="text-align:center;margin-top:10px;margin-bottom:4px;color:#b0a89f;font-size:.72rem">
      数据仅在本地浏览器运算，不上传，不储存。<br>
      算法基于 <a href="https://github.com/SylarLong/iztro" target="_blank" style="color:#b59e8f">iztro</a>（MIT 许可）
    </p>
  </div>
</section>

<!-- ② Figma 新版命盘 -->
<section id="fc-section" class="fc-section" style="display:none">
  <div class="fc-card">

    <!-- 顶栏 -->
    <div class="fc-header">
      <div class="fc-header-title">紫微排盘</div>
    </div>

    <!-- 4×4 命盘网格 -->
    <div class="fc-grid-wrap">
      <div class="fc-grid">
        <div class="fc-cell" id="fc-si"></div>
        <div class="fc-cell" id="fc-wu"></div>
        <div class="fc-cell" id="fc-wei"></div>
        <div class="fc-cell" id="fc-shen"></div>
        <div class="fc-cell" id="fc-chen"></div>
        <!-- 中央面板 -->
        <div id="fc-center-panel">
          <div class="fc-center-title">紫微排盘</div>
          <div class="fc-center-meta">
            <span class="fc-center-name" id="fc-c-name"></span>
            <span id="fc-c-meta"></span>
          </div>
          <div class="fc-center-rows">
            <div class="fc-center-row"><span class="fc-center-lbl">公历</span><span class="fc-center-val" id="fc-c-solar"></span></div>
            <div class="fc-center-row"><span class="fc-center-lbl">农历</span><span class="fc-center-val" id="fc-c-lunar"></span></div>
            <div class="fc-center-row" style="align-items:flex-start;margin-top:3px">
              <span class="fc-center-lbl" style="margin-top:1px">节气四柱</span>
              <div class="fc-sizhu" id="fc-c-sizhu"></div>
            </div>
          </div>
          <div id="fc-c-mutagen-dist" class="fc-mutagen-dist"></div>
          <div class="fc-gua-rows">
            <div class="fc-gua-row"><span class="fc-center-lbl">先天卦</span><span class="fc-center-val" id="fc-c-xiantian">—</span></div>
            <div class="fc-gua-row"><span class="fc-center-lbl">后天卦</span><span class="fc-center-val" id="fc-c-houtian">—</span></div>
            <div class="fc-gua-row"><span class="fc-center-lbl">流年卦</span><span class="fc-center-val" id="fc-c-liunian">—</span></div>
          </div>
          <div class="fc-center-btns">
            <button class="fc-center-btn">时 ↑</button>
            <button class="fc-center-btn">时 ↓</button>
            <button class="fc-center-btn">时辰校定</button>
          </div>
        </div>
        <div class="fc-cell" id="fc-you"></div>
        <div class="fc-cell" id="fc-mao"></div>
        <div class="fc-cell" id="fc-xu"></div>
        <div class="fc-cell" id="fc-yin"></div>
        <div class="fc-cell" id="fc-chou"></div>
        <div class="fc-cell" id="fc-zi"></div>
        <div class="fc-cell" id="fc-hai"></div>
      </div>
    </div>

    <!-- Tab 栏 -->
    <div class="fc-tabs-wrap">
      <div class="fc-tabs">
        <button class="fc-tab active" data-tab="先天卦">
          <span class="fc-tab-deco">◇</span>先天卦<span class="fc-tab-deco">◇</span>
        </button>
        <button class="fc-tab" data-tab="后天卦">后天卦</button>
        <button class="fc-tab" data-tab="流年卦">流年卦</button>
      </div>
    </div>

    <!-- 流年年份滚动（仅流年卦显示） -->
    <div class="fc-liunian-wrap" id="fc-liunian-wrap" style="display:none">
      <button class="fc-scroll-btn" id="fc-scroll-left">◁</button>
      <div class="fc-liunian-scroll" id="fc-liunian-scroll"></div>
      <button class="fc-scroll-btn" id="fc-scroll-right">▷</button>
    </div>

    <!-- 卦象展示 -->
    <div class="fc-hexagram-area" id="fc-hexagram-area">
      <div class="fc-hex-name" id="fc-hex-name">风水涣</div>
      <div class="fc-hex-sub" id="fc-hex-sub">FENG SHUI HUAN</div>
      <div class="fc-hex-lines" id="fc-hex-lines"></div>
    </div>

    <!-- 重新排盘按钮 -->
    <div style="padding: 0 12px 20px; text-align:center">
      <button class="nf-reset-btn" id="btn-reset">重新排盘</button>
    </div>

  </div>
</section>

<footer class="footer">
  <div class="footer-inner">
    <span>© 2026 紫微斗数在线排盘</span>
    <span>排盘算法基于 <a href="https://github.com/SylarLong/iztro" target="_blank" style="color:var(--gold)">iztro</a>（MIT 许可）</span>
  </div>
</footer>

<script type="module">
// ═══════════════════════════════════════════════════════════
// 归因：排盘算法基于 iztro by SylarLong（MIT License）
// https://github.com/SylarLong/iztro  via esm.sh CDN
// AI_HOOK: buildAnalysis() 可替换为真实 AI API 调用
// ═══════════════════════════════════════════════════════════

// ═══════════════════════════════════════════════════════════
// 输入归一化层
// ═══════════════════════════════════════════════════════════

// State
let _calMode = 'solar';      // 'solar' | 'lunar'
let _selectedCity = null;    // { province, city, lon, lat }
let _tstResult = null;       // result from calcTrueSolarTime()
let _inputNormalized = null; // final normalized params for chart engine

// ─── 公历/农历切换 ─────────────────────────────────────────
document.querySelectorAll('.nf-cal-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    _calMode = btn.dataset.cal;
    document.querySelectorAll('.nf-cal-btn').forEach(b => b.classList.toggle('active', b.dataset.cal === _calMode));
    document.getElementById('solar-inputs').style.display = _calMode === 'solar' ? 'flex' : 'none';
    document.getElementById('lunar-inputs').style.display = _calMode === 'lunar' ? 'flex' : 'none';
    updateDatePreview();
  });
});

// ─── 农历日期下拉 ───────────────────────────────────────────
const lunarDayEl = document.getElementById('inp-lunar-day');
for (let d = 1; d <= 30; d++) {
  const o = document.createElement('option');
  o.value = d;
  o.textContent = (typeof DAYS_CN !== 'undefined' ? DAYS_CN[d-1] : d + '日');
  lunarDayEl.appendChild(o);
}

// ─── 公历日期下拉 ───────────────────────────────────────────
const dayEl = document.getElementById('inp-day');
for (let d = 1; d <= 31; d++) {
  const o = document.createElement('option');
  o.value = d; o.textContent = d + '日';
  dayEl.appendChild(o);
}

// ─── 性别按钮 ──────────────────────────────────────────────
document.querySelectorAll('.nf-gender-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.nf-gender-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('inp-gender').value = btn.dataset.v;
  });
});

// ─── 城市搜索 ─────────────────────────────────────────────
const citySearchEl  = document.getElementById('inp-city-search');
const cityDropdown  = document.getElementById('city-dropdown');
const citySelectedEl= document.getElementById('city-selected');
const btnClearCity  = document.getElementById('btn-clear-city');

citySearchEl.addEventListener('input', () => {
  const q = citySearchEl.value.trim();
  if (!q || typeof CITIES === 'undefined') { cityDropdown.style.display = 'none'; return; }
  const results = CITIES.filter(c => c[0].includes(q) || c[1].includes(q)).slice(0, 8);
  if (!results.length) { cityDropdown.style.display = 'none'; return; }
  cityDropdown.innerHTML = results.map(c =>
    `<div class="nf-city-item" data-province="${c[0]}" data-city="${c[1]}" data-lon="${c[2]}" data-lat="${c[3]}">${c[0]} · ${c[1]}</div>`
  ).join('');
  cityDropdown.style.display = 'block';
});

cityDropdown.addEventListener('click', e => {
  const item = e.target.closest('.nf-city-item');
  if (!item) return;
  _selectedCity = {
    province: item.dataset.province,
    city: item.dataset.city,
    lon: parseFloat(item.dataset.lon),
    lat: parseFloat(item.dataset.lat),
  };
  citySearchEl.value = `${_selectedCity.province} · ${_selectedCity.city}`;
  btnClearCity.style.display = 'block';
  cityDropdown.style.display = 'none';
  document.getElementById('city-selected-name').textContent = `${_selectedCity.province} ${_selectedCity.city}`;
  document.getElementById('city-selected-lon').textContent  = _selectedCity.lon.toFixed(2);
  document.getElementById('city-selected-lat').textContent  = _selectedCity.lat.toFixed(2);
  citySelectedEl.style.display = 'block';
  updateTrueSolarTime();
});

btnClearCity.addEventListener('click', () => {
  _selectedCity = null;
  citySearchEl.value = '';
  btnClearCity.style.display = 'none';
  citySelectedEl.style.display = 'none';
  updateTrueSolarTime();
});

document.addEventListener('click', e => {
  if (!e.target.closest('#inp-city-search') && !e.target.closest('#city-dropdown')) {
    cityDropdown.style.display = 'none';
  }
});

// ─── 真太阳时计算 ─────────────────────────────────────────
const _SHICHEN_NAMES = ['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'];

function updateTrueSolarTime() {
  // 获取公历日期（兼容农历模式）
  let year, month, day;
  if (_calMode === 'lunar') {
    const ly = parseInt(document.getElementById('inp-lunar-year').value);
    const lm = parseInt(document.getElementById('inp-lunar-month').value);
    const ld = parseInt(document.getElementById('inp-lunar-day').value);
    const ll = document.getElementById('inp-lunar-leap').checked;
    if (ly && lm && ld && typeof lunarToSolar !== 'undefined') {
      const s = lunarToSolar(ly, lm, ld, ll);
      if (s) { year = s.getFullYear(); month = s.getMonth()+1; day = s.getDate(); }
    }
  } else {
    year  = parseInt(document.getElementById('inp-year').value);
    month = parseInt(document.getElementById('inp-month').value);
    day   = parseInt(document.getElementById('inp-day').value);
  }

  const unknownTime   = document.getElementById('inp-time-unknown').checked;
  const shichenPreview = document.getElementById('tst-shichen-preview');

  if (!year || !month || !day) {
    document.getElementById('tst-display').textContent = '请先输入出生日期和地点';
    document.getElementById('tst-estimated-badge').style.display = 'none';
    if (shichenPreview) shichenPreview.textContent = '';
    _tstResult = null;
    return;
  }

  if (unknownTime) {
    document.getElementById('tst-display').textContent = '时刻未知，排盘默认采用午时（11:00–13:00）';
    document.getElementById('tst-estimated-badge').style.display = 'inline';
    if (shichenPreview) shichenPreview.textContent = '';
    _tstResult = null;
    return;
  }

  // 读取精确时刻
  let hour = 12, minute = 0;
  const tv = document.getElementById('inp-time-val').value;
  if (tv) {
    const parts = tv.split(':');
    hour   = parseInt(parts[0]) || 0;
    minute = parseInt(parts[1]) || 0;
  }

  if (typeof calcTrueSolarTime === 'undefined') {
    document.getElementById('tst-display').textContent = '真太阳时模块未加载';
    return;
  }

  _tstResult = calcTrueSolarTime({
    year, month, day, hour, minute,
    longitude: _selectedCity?.lon,
    cityName: _selectedCity ? `${_selectedCity.province}${_selectedCity.city}` : null
  });

  const badge = document.getElementById('tst-estimated-badge');
  badge.style.display = _tstResult.isEstimated ? 'inline' : 'none';

  const pad = n => String(n).padStart(2,'0');
  const cstShichen = _SHICHEN_NAMES[tstToShichen(hour, minute)];
  const tstShichen = _SHICHEN_NAMES[tstToShichen(_tstResult.trueSolarHour, _tstResult.trueSolarMinute)];
  const crossed = cstShichen !== tstShichen;

  // 时辰预览行（明确告知最终采用哪个时辰）
  if (shichenPreview) {
    shichenPreview.innerHTML = crossed
      ? `北京时间 ${pad(hour)}:${pad(minute)} → ${cstShichen}时，真太阳时后跨越时辰 → <strong style="color:#963d32">${tstShichen}时（排盘采用）</strong>`
      : `${pad(hour)}:${pad(minute)} 真太阳时修正后仍在 <strong>${cstShichen}时</strong>，排盘采用 <strong>${cstShichen}时</strong>`;
    shichenPreview.style.display = 'block';
  }

  document.getElementById('tst-display').innerHTML =
    `<span style="color:#4a3f35">北京时间: ${pad(hour)}:${pad(minute)} · ${cstShichen}时</span><br>` +
    `<span style="color:${_tstResult.isEstimated?'#c08060':'#6b4e41'}">真太阳时: ${pad(_tstResult.trueSolarHour)}:${pad(_tstResult.trueSolarMinute)} · <strong>${tstShichen}时</strong>${_tstResult.isEstimated?' （无出生地，以北京经度估算）':''}</span><br>` +
    `<span style="color:#b0a89f">偏差 ${_tstResult.diffStr}（经度修正 ${_tstResult.lonCorrection>0?'+':''}${_tstResult.lonCorrection}分，均时差 ${_tstResult.eot>0?'+':''}${_tstResult.eot}分）</span>`;
}

// ─── 日期预览 ─────────────────────────────────────────────
function updateDatePreview() {
  const preview = document.getElementById('date-preview');
  if (_calMode === 'solar') {
    const y = document.getElementById('inp-year').value;
    const m = document.getElementById('inp-month').value;
    const d = document.getElementById('inp-day').value;
    if (y && m && d) {
      const lunar = (typeof solarToLunar !== 'undefined') ? solarToLunar(+y, +m, +d) : null;
      preview.textContent = lunar ? `农历: ${typeof formatLunarDate !== 'undefined' ? formatLunarDate(lunar) : ''}` : '';
    } else { preview.textContent = ''; }
  } else {
    const y = document.getElementById('inp-lunar-year').value;
    const m = document.getElementById('inp-lunar-month').value;
    const d = document.getElementById('inp-lunar-day').value;
    const isLeap = document.getElementById('inp-lunar-leap').checked;
    if (y && m && d && typeof lunarToSolar !== 'undefined') {
      const solar = lunarToSolar(+y, +m, +d, isLeap);
      if (solar) {
        const pad = n => String(n).padStart(2,'0');
        preview.textContent = `公历: ${solar.getFullYear()}-${pad(solar.getMonth()+1)}-${pad(solar.getDate())}`;
        preview.style.color = '#6b4e41';
      } else {
        preview.textContent = '农历日期无效';
        preview.style.color = '#c04040';
      }
    } else { preview.textContent = ''; }
  }
  updateTrueSolarTime();
}

// Bind date change listeners
['inp-year','inp-month','inp-day'].forEach(id => {
  const el = document.getElementById(id);
  if (el) el.addEventListener('change', updateDatePreview);
  if (el && el.type === 'number') el.addEventListener('input', updateDatePreview);
});
['inp-lunar-year','inp-lunar-month','inp-lunar-day','inp-lunar-leap'].forEach(id => {
  const el = document.getElementById(id);

// ─── 输入归一化 ────────────────────────────────────────────
function normalizeInput() {
  const gender  = document.getElementById('inp-gender').value;
  const name    = document.getElementById('inp-name')?.value?.trim() || '';

  let year, month, day, calModeLabel;

  if (_calMode === 'lunar') {
    const ly  = parseInt(document.getElementById('inp-lunar-year').value);
    const lm  = parseInt(document.getElementById('inp-lunar-month').value);
    const ld  = parseInt(document.getElementById('inp-lunar-day').value);
    const ll  = document.getElementById('inp-lunar-leap').checked;

    if (!ly || !lm || !ld) return { error: '请填写完整的农历出生年、月、日' };

    const solar = (typeof lunarToSolar !== 'undefined') ? lunarToSolar(ly, lm, ld, ll) : null;
    if (!solar) return { error: '农历日期无效或超出支持范围（1990-2026）' };

    year  = solar.getFullYear();
    month = solar.getMonth() + 1;
    day   = solar.getDate();

    const lunarObj = { year: ly, month: lm, day: ld, isLeap: ll };
    calModeLabel = `农历 ${typeof formatLunarDate !== 'undefined' ? formatLunarDate(lunarObj) : ly + '年'}（公历 ${year}-${String(month).padStart(2,'0')}-${String(day).padStart(2,'0')}）`;
  } else {
    year    = parseInt(document.getElementById('inp-year').value);
    month   = parseInt(document.getElementById('inp-month').value);
    day     = parseInt(document.getElementById('inp-day').value);

    if (!year || !month || !day) return { error: '请填写完整的出生年、月、日' };
    if (year < 1900 || year > 2030) return { error: '出生年份请填写 1900–2030' };
    calModeLabel = `公历 ${year}-${String(month).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
  }

  // ── 统一时刻处理 ────────────────────────────────────────
  const unknownTime = document.getElementById('inp-time-unknown').checked;
  let cstHour = 12, cstMinute = 0;
  if (!unknownTime) {
    const tv = document.getElementById('inp-time-val').value;
    if (tv) {
      const parts = tv.split(':');
      cstHour   = parseInt(parts[0]) || 0;
      cstMinute = parseInt(parts[1]) || 0;
    }
  }
  const pad2 = n => String(n).padStart(2,'0');
  calModeLabel += unknownTime ? ' 时辰未知' : ` ${pad2(cstHour)}:${pad2(cstMinute)}`;

  // 正确流程：具体时刻 → 真太阳时 → 时辰索引
  let finalTimeIdx;
  if (unknownTime) {
    finalTimeIdx = 6; // 午时，明确标注估算
  } else if (_tstResult && !_tstResult.isEstimated) {
    // 有出生地：用真太阳时对应时辰
    finalTimeIdx = typeof tstToShichen !== 'undefined'
      ? tstToShichen(_tstResult.trueSolarHour, _tstResult.trueSolarMinute)
      : tstToShichen(cstHour, cstMinute);
  } else {
    // 无出生地：直接用北京时间对应时辰（已含默认经度估算）
    finalTimeIdx = typeof tstToShichen !== 'undefined'
      ? tstToShichen(_tstResult?.trueSolarHour ?? cstHour, _tstResult?.trueSolarMinute ?? cstMinute)
      : 6;
  }

  const dateStr = `${year}-${String(month).padStart(2,'0')}-${String(day).padStart(2,'0')}`;

  return {
    year, month, day, dateStr,
    timeIdx: finalTimeIdx,
    cstHour, cstMinute,
    gender, name,
    unknownTime,
    calMode: _calMode,
    calModeLabel,
    city: _selectedCity,
    tstResult: _tstResult,
  };
}

document.getElementById('btn-submit').addEventListener('click', async () => {
  const norm = normalizeInput();
  if (norm.error) { showError(norm.error); return; }

  hideError();
  setLoading(true);

  try {
    const mod = await import('https://esm.sh/iztro@2');
    const lib = mod.astro || mod.default?.astro;
    if (!lib) throw new Error('iztro 加载失败，请刷新重试');

    const genderStr = norm.gender === 'male' ? '男' : '女';
    _chart = typeof lib.bySolar === 'function'
      ? lib.bySolar(norm.dateStr, norm.timeIdx, genderStr, true)
      : lib.astrolabeBySolarDate(norm.dateStr, norm.timeIdx, genderStr, true);

    _chartInputs = {
      dateStr: norm.dateStr, timeIdx: norm.timeIdx,
      gender: norm.gender, unknownTime: norm.unknownTime,
      norm  // store full normalized info
    };

    renderFigmaChart(_chart, norm.gender, norm.dateStr, norm);
    document.getElementById('fc-section').style.display = 'block';
    document.getElementById('fc-section').scrollIntoView({ behavior: 'smooth' });
  } catch (err) {
    showError('排盘失败：' + (err.message || '请检查出生日期，或刷新重试'));
    console.error(err);
  } finally {
    setLoading(false);
  }
});

// ─── 渲染命盘（保留，供内部使用） ────────────────────────
function renderChart(chart, unknownTime, gender, dateStr) {
  clearSanyaoLines();
  _currentSanyaoBranch = null;
  // 清空
  Object.values(BRANCH_ID).forEach(id => {
    const el = document.getElementById(id);
    if (el) { el.innerHTML = ''; el.className = 'palace-cell'; }
  });

  // 中心
  const ccZodiac = document.getElementById('cc-zodiac');
  if (ccZodiac) ccZodiac.textContent  = chart.zodiac || '';
  const ccDate = document.getElementById('cc-date');
  if (ccDate) ccDate.textContent    = chart.chineseDate || chart.lunarDate || '';
  const ccFive = document.getElementById('cc-five');
  if (ccFive) ccFive.textContent    = chart.fiveElementsClass || '—';
  const ccSoul = document.getElementById('cc-soul');
  if (ccSoul) ccSoul.textContent    = chart.soul || '—';
  const ccBody = document.getElementById('cc-body');
  if (ccBody) ccBody.textContent    = chart.body || '—';
  const ccLifeBr = document.getElementById('cc-life-br');
  if (ccLifeBr) ccLifeBr.textContent = chart.earthlyBranchOfSoulPalace || '—';
  const ccBodyBr = document.getElementById('cc-body-br');
  if (ccBodyBr) ccBodyBr.textContent = chart.earthlyBranchOfBodyPalace || '—';

  const genderLabel = gender === 'male' ? '男命' : '女命';
  const resultMeta = document.getElementById('result-meta');
  if (resultMeta) resultMeta.textContent =
    `公历 ${dateStr} · ${genderLabel} · ${chart.sign || ''}`;
  const timeWarn = document.getElementById('time-warn');
  if (timeWarn) timeWarn.style.display = unknownTime ? 'block' : 'none';

  // 填宫
  const palaces = chart.palaces || [];
  palaces.forEach(p => {
    const id = BRANCH_ID[p.earthlyBranch];
    if (!id) return;
    const cell = document.getElementById(id);
    if (!cell) return;

    const isLife = (p.name === '命宫' || p.name === '命');
    const isBody = !!p.isBodyPalace;

    // 三合组着色（永久显示）
    const sanheG = SANHE_GROUP[p.earthlyBranch];
    if (sanheG) cell.classList.add('sh' + sanheG);
    if (isLife) cell.classList.add('is-life');
    if (isBody) cell.classList.add('is-body');

    // 主星
    const majorHtml = (p.majorStars || []).map(s => {
      const m = s.mutagen ? `<span class="mutagen-badge">${s.mutagen}</span>` : '';
      const b = s.brightness ? `<span class="brightness-tag">${s.brightness}</span>` : '';
      return `<span class="star star-major">${s.name}${b}${m}</span>`;
    }).join('');

    // 辅星（全部显示）
    const minorHtml = (p.minorStars || []).map(s => {
      const m = s.mutagen ? `<span class="mutagen-badge sm">${s.mutagen}</span>` : '';
      return `<span class="star star-minor">${s.name}${m}</span>`;
    }).join('');

    // 杂曜（adjectiveStars）
    const adjArr = p.adjectiveStars || p.adjStars || [];
    const adjHtml = adjArr.map(s =>
      `<span class="star star-adj">${s.name || s}</span>`
    ).join('');

    // 长生12神 + 博士12神
    const csTag = p.changsheng12 ? `<span class="cs-tag">${p.changsheng12}</span>` : '';
    const bsTag = p.boshi12      ? `<span class="cs-tag bs">${p.boshi12}</span>`      : '';

    // 大限
    const stageHtml = p.decadal?.range
      ? `<span class="palace-stage">${p.decadal.range[0]}–${p.decadal.range[1]}岁</span>` : '';

    cell.innerHTML = `
      <div class="palace-head">
        <span class="palace-name">${p.name || ''}${isBody ? '<span class="badge-body">身</span>' : ''}</span>
        <span class="palace-stem">${p.heavenlyStem || ''}${p.earthlyBranch || ''}</span>
      </div>
      ${stageHtml}
      <div class="palace-major">${majorHtml || '<span class="empty-palace">空宫</span>'}</div>
      ${minorHtml ? `<div class="palace-minor">${minorHtml}</div>` : ''}
      ${adjHtml   ? `<div class="palace-adj">${adjHtml}</div>` : ''}
      ${(csTag||bsTag) ? `<div class="palace-cs">${csTag}${bsTag}</div>` : ''}
    `;

    // 点击高亮三方四正
    cell.addEventListener('click', () => highlightSanyao(p.earthlyBranch, p.name));
  });

  // 默认高亮命宫三方四正
  const lifeBranch = chart.earthlyBranchOfSoulPalace;
  if (lifeBranch) highlightSanyao(lifeBranch, '命宫');
}

// ─── 三方四正高亮 + 连线 ──────────────────────────────────
function highlightSanyao(branch, palaceName) {
  document.querySelectorAll('.palace-cell').forEach(el =>
    el.classList.remove('sanyao-self','sanyao-sanhe','sanyao-dui')
  );
  const selfEl = document.getElementById(BRANCH_ID[branch]);
  if (selfEl) selfEl.classList.add('sanyao-self');

  (SANHE_PARTNERS[branch] || []).forEach(b => {
    const el = document.getElementById(BRANCH_ID[b]);
    if (el) el.classList.add('sanyao-sanhe');
  });

  const duiBr = DUIGONG[branch];
  if (duiBr) {
    const el = document.getElementById(BRANCH_ID[duiBr]);
    if (el) el.classList.add('sanyao-dui');
  }

  const sanyaoLabel = document.getElementById('sanyao-label');
  if (sanyaoLabel) sanyaoLabel.textContent =
    `${palaceName || ''}（${branch}）的三方四正：${(SANHE_PARTNERS[branch]||[]).join('、')} + 对宫${duiBr}`;

  _currentSanyaoBranch = branch;
  drawSanyaoLines(branch);
}

// ─── 宫位端口 + 走廊路由 ──────────────────────────────────
const BRANCH_SIDE = {
  '巳':'NW','午':'N', '未':'N', '申':'NE',
  '辰':'W', '卯':'W',
  '酉':'E', '戌':'E',
  '寅':'SW','丑':'S', '子':'S', '亥':'SE',
};

function getPort(branch, svgRect) {
  const id = BRANCH_ID[branch];
  if (!id) return null;
  const cell = document.getElementById(id);
  if (!cell) return null;
  const r = cell.getBoundingClientRect();
  const x0 = r.left - svgRect.left, y0 = r.top - svgRect.top;
  const x1 = x0 + r.width, y1 = y0 + r.height;
  const xm = (x0 + x1) / 2, ym = (y0 + y1) / 2;
  switch (BRANCH_SIDE[branch]) {
    case 'N':  return { x: xm, y: y1 };
    case 'S':  return { x: xm, y: y0 };
    case 'W':  return { x: x1, y: ym };
    case 'E':  return { x: x0, y: ym };
    case 'NW': return { x: x1, y: y1 };
    case 'NE': return { x: x0, y: y1 };
    case 'SW': return { x: x1, y: y0 };
    case 'SE': return { x: x0, y: y0 };
    default:   return { x: xm, y: ym };
  }
}

function getCorridor(svgRect) {
  const centerEl = document.getElementById('chart-center');
  if (!centerEl) return { top:0, bottom:0, left:0, right:0 };
  const r = centerEl.getBoundingClientRect();
  return {
    top:    r.top    - svgRect.top,
    bottom: r.bottom - svgRect.top,
    left:   r.left   - svgRect.left,
    right:  r.right  - svgRect.left,
  };
}

function clamp01(v) { return v < 0 ? 0 : v > 1 ? 1 : v; }

function perimParam(port, side, corr) {
  const W = corr.right - corr.left, H = corr.bottom - corr.top;
  switch (side) {
    case 'NW': return 0;
    case 'N':  return clamp01((port.x - corr.left) / W);
    case 'NE': return 1;
    case 'E':  return 1 + clamp01((port.y - corr.top) / H);
    case 'SE': return 2;
    case 'S':  return 2 + clamp01((corr.right - port.x) / W);
    case 'SW': return 3;
    case 'W':  return 3 + clamp01((corr.bottom - port.y) / H);
    default:   return 0;
  }
}

function perimPoint(param, corr) {
  const W = corr.right - corr.left, H = corr.bottom - corr.top;
  const p = ((param % 4) + 4) % 4;
  if (p <= 1) return { x: corr.left + p * W,          y: corr.top             };
  if (p <= 2) return { x: corr.right,                  y: corr.top + (p-1)*H   };
  if (p <= 3) return { x: corr.right - (p-2)*W,        y: corr.bottom           };
  return               { x: corr.left,                  y: corr.bottom - (p-3)*H };
}

function routePoints(portA, sideA, portB, sideB, corr) {
  const pA = perimParam(portA, sideA, corr);
  const pB = perimParam(portB, sideB, corr);
  const cwD  = ((pB - pA) % 4 + 4) % 4;
  const ccwD = ((pA - pB) % 4 + 4) % 4;

  function cwCorners(start, dist) {
    const corners = [];
    const end = start + dist;
    for (let c = Math.ceil(start + 1e-6); c <= end - 1e-6; c++) {
      corners.push(perimPoint(c, corr));
    }
    return corners;
  }

  const snapA = perimPoint(pA, corr);
  const snapB = perimPoint(pB, corr);
  const via   = cwD <= ccwD
    ? cwCorners(pA, cwD)
    : cwCorners(pB, ccwD).reverse();

  const EPS = 2;
  function near(a, b) { return Math.abs(a.x-b.x) < EPS && Math.abs(a.y-b.y) < EPS; }
  const pts = [portA];
  if (!near(snapA, portA))              pts.push(snapA);
  via.forEach(w => { if (!near(w, pts[pts.length-1])) pts.push(w); });
  if (!near(snapB, pts[pts.length-1])) pts.push(snapB);
  if (!near(portB, pts[pts.length-1])) pts.push(portB);
  return pts;
}

// ─── SVG 连线绘制 ─────────────────────────────────────────
function drawSanyaoLines(branch) {
  const svgEl = document.getElementById('sanyao-svg');
  if (!svgEl) return;
  clearSanyaoLines();
  const svgRect = svgEl.getBoundingClientRect();
  const corr    = getCorridor(svgRect);

  const defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
  defs.innerHTML = `
    <filter id="sg-gold" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="sg-teal" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>`;
  svgEl.appendChild(defs);

  function mkPolyline(pts, stroke, opacity, dash, filter) {
    if (!pts || pts.length < 2) return;
    const el = document.createElementNS('http://www.w3.org/2000/svg', 'polyline');
    el.setAttribute('points', pts.map(p => `${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' '));
    el.setAttribute('fill', 'none');
    el.setAttribute('stroke', stroke);
    el.setAttribute('stroke-width', '1.6');
    el.setAttribute('stroke-opacity', opacity);
    el.setAttribute('stroke-linecap', 'round');
    el.setAttribute('stroke-linejoin', 'round');
    if (dash)   el.setAttribute('stroke-dasharray', dash);
    if (filter) el.setAttribute('filter', `url(#${filter})`);
    svgEl.appendChild(el);
  }

  function mkDot(p, fill, opacity) {
    if (!p) return;
    const el = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    el.setAttribute('cx', p.x.toFixed(1));
    el.setAttribute('cy', p.y.toFixed(1));
    el.setAttribute('r', '2.5');
    el.setAttribute('fill', fill);
    el.setAttribute('fill-opacity', opacity);
    el.setAttribute('filter', 'url(#sg-gold)');
    svgEl.appendChild(el);
  }

  const pSelf = getPort(branch, svgRect);
  const sSelf = BRANCH_SIDE[branch];
  const partners = SANHE_PARTNERS[branch] || [];
  const duiBr = DUIGONG[branch];
  if (!pSelf) return;

  const pSh1 = partners[0] ? getPort(partners[0], svgRect) : null;
  const pSh2 = partners[1] ? getPort(partners[1], svgRect) : null;
  const pDui = duiBr ? getPort(duiBr, svgRect) : null;
  const sSh1 = partners[0] ? BRANCH_SIDE[partners[0]] : null;
  const sSh2 = partners[1] ? BRANCH_SIDE[partners[1]] : null;
  const sDui = duiBr ? BRANCH_SIDE[duiBr] : null;

  if (pSh1 && sSh1) mkPolyline(routePoints(pSelf, sSelf, pSh1, sSh1, corr), '#d4a843', '0.62', null,  'sg-gold');
  if (pSh2 && sSh2) mkPolyline(routePoints(pSelf, sSelf, pSh2, sSh2, corr), '#d4a843', '0.62', null,  'sg-gold');
  if (pSh1 && pSh2 && sSh1 && sSh2)
    mkPolyline(routePoints(pSh1, sSh1, pSh2, sSh2, corr), '#9b6fd4', '0.28', '5 4', 'sg-gold');
  if (pDui && sDui) mkPolyline(routePoints(pSelf, sSelf, pDui, sDui, corr), '#50c8c8', '0.48', '7 4', 'sg-teal');

  mkDot(pSelf, '#d4a843', '0.9');
  mkDot(pSh1,  '#d4a843', '0.65');
  mkDot(pSh2,  '#d4a843', '0.65');
  mkDot(pDui,  '#50c8c8', '0.65');
}

function clearSanyaoLines() {
  const svg = document.getElementById('sanyao-svg');
  if (svg) while (svg.firstChild) svg.removeChild(svg.firstChild);
}

// ─── Figma 新版命盘渲染 ────────────────────────────────────
const FC_BRANCH_ID = {
  '巳':'fc-si','午':'fc-wu','未':'fc-wei','申':'fc-shen',
  '辰':'fc-chen','酉':'fc-you',
  '卯':'fc-mao','戌':'fc-xu',
  '寅':'fc-yin','丑':'fc-chou','子':'fc-zi','亥':'fc-hai'
};
const FC_ZHI = ['寅','卯','辰','巳','午','未','申','酉','戌','亥','子','丑'];
const FC_HEXAGRAMS = {
  '先天卦':{ name:'风水涣', sub:'FENG SHUI HUAN',  lines:['solid','solid','broken','gap','broken','solid','broken'] },
  '后天卦':{ name:'水天需', sub:'SHUI TIAN XU',    lines:['broken','solid','broken','gap','solid','solid','solid'] },
  '流年卦':{ name:'天风姤', sub:'LIU NIAN GUA',    lines:['solid','solid','solid','gap','solid','solid','broken'] },
};
let _fcActiveTab       = '先天卦';
let _fcActiveAge       = 1;
let _fcBirthYear       = 1991;
let _fcYearCards       = [];
let _fcYearlyMap       = {};
let _fcXiaoLianBranch  = null; // 当前虚岁小限所在地支

// ── 小限宫位计算 ──────────────────────────────────────────
// 按传统紫微斗数：年支三合起点 + 男顺女逆
function calcXiaoLianBranch(yearBranch, gender, xuAge) {
  const BRANCHES = ['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'];
  const MALE_START   = {'寅':2,'午':2,'戌':2, '申':8,'子':8,'辰':8, '亥':11,'卯':11,'未':11, '巳':5,'酉':5,'丑':5};
  const FEMALE_START = {'寅':10,'午':10,'戌':10, '申':4,'子':4,'辰':4, '亥':7,'卯':7,'未':7, '巳':1,'酉':1,'丑':1};
  const startMap = gender === 'male' ? MALE_START : FEMALE_START;
  const dir      = gender === 'male' ? 1 : -1;
  const startIdx = startMap[yearBranch] ?? 2; // 默认从寅起
  return BRANCHES[((startIdx + dir * (xuAge - 1)) % 12 + 12) % 12];
}

function fcBuildYearCards(birthYear) {
  const curYear = new Date().getFullYear();
  const curAge  = curYear - birthYear + 1; // 虚岁
  _fcActiveAge  = Math.max(1, Math.min(100, curAge));
  _fcYearCards  = [];
  for (let age = 1; age <= 100; age++) {
    _fcYearCards.push({ age, year: birthYear + age - 1 }); // 虚岁N → 出生年+N-1
  }
}

function fcLoadYearly(year) {
  _fcYearlyMap = {};
  _fcXiaoLianBranch = null;
  if (!_chart || typeof _chart.horoscope !== 'function') {
    // 无 horoscope 时直接用公式计算小限宫
    _fcComputeXiaoLian();
    return;
  }
  try {
    const h = _chart.horoscope(`${year}-06-01`, 0);
    const scope = h.yearly || h.decadal || h;
    const palaces = scope.palaces || scope.palace || [];
    palaces.forEach(yp => {
      const br = yp.earthlyBranch;
      if (br) {
        _fcYearlyMap[br] = yp;
        // 检测 iztro 标注的流年命宫（isOriginalPalace 或宫名含小限/命）
        if (!_fcXiaoLianBranch &&
            (yp.isOriginalPalace ||
             (yp.name && (yp.name.includes('小限') || yp.name.includes('流年命'))))) {
          _fcXiaoLianBranch = br;
        }
      }
    });
  } catch(e) {
    console.warn('horoscope() 调用失败:', e);
  }
  // 若 iztro 未给出，用公式兜底
  if (!_fcXiaoLianBranch) _fcComputeXiaoLian();
}

function _fcComputeXiaoLian() {
  if (!_chart) return;
  const rd = _chart.rawDates || _chart;
  const yearBranch = rd.yearBranch || rd.yearEarthlyBranch || '';
  const gender = _chartInputs?.gender || 'male';
  _fcXiaoLianBranch = calcXiaoLianBranch(yearBranch, gender, _fcActiveAge);
}

function fcRenderHexagram() {
  const hexData = _fcActiveTab === '流年卦'
    ? { name:'天风姤', sub:'LIU NIAN GUA', lines: FC_HEXAGRAMS['流年卦'].lines }
    : FC_HEXAGRAMS[_fcActiveTab];
  document.getElementById('fc-hex-name').textContent = hexData.name;
  document.getElementById('fc-hex-sub').textContent  = hexData.sub;
  const container = document.getElementById('fc-hex-lines');
  container.innerHTML = '';
  hexData.lines.forEach(line => {
    const el = document.createElement('div');
    if (line === 'gap') { el.className = 'fc-hex-gap'; }
    else if (line === 'solid') { el.className = 'fc-yao-solid'; }
    else { el.className = 'fc-yao-broken'; el.innerHTML = '<div></div><div></div>'; }
    container.appendChild(el);
  });
}

function fcRenderTabs() {
  document.querySelectorAll('.fc-tab').forEach(btn => {
    const active = btn.dataset.tab === _fcActiveTab;
    btn.classList.toggle('active', active);
    btn.innerHTML = active
      ? `<span class="fc-tab-deco">◇</span>${btn.dataset.tab}<span class="fc-tab-deco">◇</span>`
      : btn.dataset.tab;
  });
  const lnWrap = document.getElementById('fc-liunian-wrap');
  if (lnWrap) lnWrap.style.display = _fcActiveTab === '流年卦' ? 'flex' : 'none';
}

function fcSelectYear(age) {
  _fcActiveAge = age;
  const year = _fcBirthYear + age - 1; // 虚岁N → 出生年+N-1
  fcLoadYearly(year);
  // 更新中间区：流年卦 + 小限宫
  const palaceName = _fcXiaoLianBranch
    ? (_chart?.palaces?.find(p => p.earthlyBranch === _fcXiaoLianBranch)?.name || '') : '';
  document.getElementById('fc-c-liunian').textContent =
    `${age}岁（${year}年）${palaceName ? ' · 小限' + palaceName : ''}`;
  fcRenderLiunianScroll();
  renderFigmaHighlight(_fcActiveBranch || (_chart && _chart.earthlyBranchOfSoulPalace) || '卯');
}

function fcRenderLiunianScroll() {
  const scroll = document.getElementById('fc-liunian-scroll');
  if (!scroll) return;
  scroll.innerHTML = '';
  _fcYearCards.forEach(item => {
    const card = document.createElement('div');
    card.className = 'fc-year-card' + (item.age === _fcActiveAge ? ' active' : '');
    card.innerHTML = `<span>${item.age}岁</span><span style="font-size:10px">${item.year}年</span>`;
    card.addEventListener('click', () => fcSelectYear(item.age));
    scroll.appendChild(card);
  });
  requestAnimationFrame(() => {
    const active = scroll.querySelector('.fc-year-card.active');
    if (active) active.scrollIntoView({ inline: 'center', behavior: 'smooth', block: 'nearest' });
  });
}

let _fcActiveBranch = '';

function fcBuildCell(p, activeBranch) {
  const branch = p.earthlyBranch;
  const id = FC_BRANCH_ID[branch];
  const cell = document.getElementById(id);
  if (!cell) return;

  const aIdx = FC_ZHI.indexOf(activeBranch);
  const isBen = branch === activeBranch;
  const sanhe = [FC_ZHI[(aIdx+4)%12], FC_ZHI[(aIdx+8)%12], FC_ZHI[(aIdx+6)%12]];
  const isRel = !isBen && sanhe.includes(branch);
  const isXiaoLian = _fcActiveTab === '流年卦' && branch === _fcXiaoLianBranch;
  cell.className = 'fc-cell'
    + (isBen ? ' fc-ben' : isRel ? ' fc-rel' : '')
    + (isXiaoLian ? ' fc-xiaolian' : '');

  const fcMutagenCls = m => m==='化禄'?'fc-mutagen-lu':m==='化权'?'fc-mutagen-quan':m==='化科'?'fc-mutagen-ke':'fc-mutagen-ji';

  // 宫位级四化行（生年四化 — 主星/文昌/文曲/左辅/右弼均可带四化）
  const _allStarsForMut = [
    ...(p.majorStars||[]),
    ...(p.minorStars||[]),
    ...(p.adjectiveStars||p.adjStars||[])
  ];
  const palMutagenHtml = _allStarsForMut.filter(s=>s&&s.mutagen).map(s =>
    `<span class="fc-pal-mutagen ${fcMutagenCls(s.mutagen)}">${s.mutagen}</span>`
  ).join('');

  const majorHtml = (p.majorStars || []).map(s =>
    `<div class="fc-major-star">${s.name}${s.brightness||''}</div>`
  ).join('');

  const allMinor = [
    ...(p.minorStars || []),
    ...(p.adjectiveStars || p.adjStars || [])
  ];
  const minorHtml = allMinor.map(s => {
    const name = s.name || s;
    return `<div class="fc-minor-star">${name}</div>`;
  }).join('');

  const shenHtml = [p.changsheng12, p.boshi12].filter(Boolean)
    .map(s=>`<span>${s}</span>`).join('');

  // 小流年宫位标识（优先于普通流年叠加行）
  let xiaoLianHtml = '';
  if (isXiaoLian) {
    xiaoLianHtml = `<div class="fc-xiaolian-badge">${_fcActiveAge}岁·小限</div>`;
  }

  let yearlyHtml = '';
  if (_fcActiveTab === '流年卦') {
    const yp = _fcYearlyMap[branch];
    if (yp) {
      const yMutagen = (yp.mutagen || []).map(m =>
        `<span class="fc-minor-star" style="color:#963d32">${m}</span>`
      ).join('');
      const yStars = (yp.stars || yp.majorStars || []).map(s =>
        `<span class="fc-minor-star" style="color:#476885">${s.name||s}</span>`
      ).join('');
      if (yMutagen || yStars) {
        yearlyHtml = `<div class="fc-yearly-row">${yMutagen}${yStars}</div>`;
      }
    }
  }

  const stemBranch = (p.heavenlyStem||'') + (p.earthlyBranch||'');
  const ageStr = p.decadal?.range ? `${p.decadal.range[0]}–${p.decadal.range[1]}` : '';
  const isBody = !!p.isBodyPalace;
  const palaceName = (isBody ? '身宫\n' : '') + (p.name || '');

  cell.innerHTML = `
    ${xiaoLianHtml}
    <div class="fc-cell-top">
      ${palMutagenHtml ? `<div class="fc-cell-mutagen">${palMutagenHtml}</div>` : ''}
      <div class="fc-major-list">${majorHtml}</div>
      <div class="fc-minor-list">${minorHtml}</div>
    </div>
    ${yearlyHtml}
    <div class="fc-cell-bottom">
      <div class="fc-shen-list">${shenHtml}</div>
      <div class="fc-palace-info">
        <span class="fc-branch">${stemBranch}</span>
        <span class="fc-age">${ageStr}</span>
        <span class="fc-palace-name">${palaceName}</span>
      </div>
    </div>`;

  cell.onclick = () => renderFigmaHighlight(branch);
}

function renderFigmaHighlight(activeBranch) {
  if (!_chart) return;
  _fcActiveBranch = activeBranch;
  (_chart.palaces || []).forEach(p => fcBuildCell(p, activeBranch));
}

function renderFigmaChart(chart, gender, dateStr, norm) {
  const lifeBranch = chart.earthlyBranchOfSoulPalace;
  _fcBirthYear = parseInt(dateStr.split('-')[0]) || 1991;

  // 中央面板
  const genderLabel = gender === 'male' ? '阳男' : '阴女';
  const nameVal = document.getElementById('inp-name')?.value || genderLabel;
  document.getElementById('fc-c-name').textContent    = nameVal;
  document.getElementById('fc-c-meta').textContent    = chart.fiveElementsClass || '';

  if (norm) {
    document.getElementById('fc-c-solar').textContent = norm.calModeLabel || dateStr;
    if (norm.tstResult) {
      const pad = n => String(n).padStart(2,'0');
      const tstSh = _SHICHEN_NAMES[tstToShichen(norm.tstResult.trueSolarHour, norm.tstResult.trueSolarMinute)];
      document.getElementById('fc-c-lunar').textContent =
        `真太阳时 ${pad(norm.tstResult.trueSolarHour)}:${pad(norm.tstResult.trueSolarMinute)} · ${tstSh}时` +
        (norm.tstResult.isEstimated ? '（北京经度估算）' : '');
    } else if (norm.unknownTime) {
      document.getElementById('fc-c-lunar').textContent = '时刻未知（午时估算）';
    } else {
      document.getElementById('fc-c-lunar').textContent = chart.chineseDate || chart.lunarDate || '';
    }
  } else {
    document.getElementById('fc-c-solar').textContent = dateStr || '';
    document.getElementById('fc-c-lunar').textContent = chart.chineseDate || chart.lunarDate || '';
  }

  const sizhuEl = document.getElementById('fc-c-sizhu');
  const STEM_COLORS = ['#886a4a','#4d7a5b','#9b4238','#476885'];
  const rd = chart.rawDates || chart;
  const pillars = [
    [rd.yearStem||rd.yearHeavenlyStem||'', rd.yearBranch||rd.yearEarthlyBranch||''],
    [rd.monthStem||rd.monthHeavenlyStem||'', rd.monthBranch||rd.monthEarthlyBranch||''],
    [rd.dayStem||rd.dayHeavenlyStem||'', rd.dayBranch||rd.dayEarthlyBranch||''],
    [rd.timeStem||rd.timeHeavenlyStem||'', rd.timeBranch||rd.timeEarthlyBranch||''],
  ];
  sizhuEl.innerHTML = '';
  pillars.forEach(([stem, branch], i) => {
    if (stem || branch) {
      const col = document.createElement('div');
      col.className = 'fc-sizhu-col';
      col.style.color = STEM_COLORS[i];
      col.innerHTML = `<span>${stem||'?'}</span><span>${branch||'?'}</span>`;
      sizhuEl.appendChild(col);
    }
  });
  if (!sizhuEl.children.length) {
    sizhuEl.innerHTML = '<span style="font-size:8px;color:#8c7e75">暂无四柱</span>';
  }

  // 生年四化分布（按年干推算，主星及文昌/文曲/左辅/右弼均可带四化）
  const mutDistEl = document.getElementById('fc-c-mutagen-dist');
  if (mutDistEl) {
    const MCLS = {'化禄':'fc-mutagen-lu','化权':'fc-mutagen-quan','化科':'fc-mutagen-ke','化忌':'fc-mutagen-ji'};
    const MUT_ORDER = ['化禄','化权','化科','化忌'];
    const rawMut = (chart.palaces||[]).flatMap(p => {
      const allS = [...(p.majorStars||[]), ...(p.minorStars||[]), ...(p.adjectiveStars||p.adjStars||[])];
      return allS.filter(s=>s&&s.mutagen).map(s=>({pname:p.name||'', sname:s.name, m:s.mutagen}));
    });
    rawMut.sort((a,b) => MUT_ORDER.indexOf(a.m) - MUT_ORDER.indexOf(b.m));
    const mutItems = rawMut.map(({pname,sname,m}) =>
      `<div class="fc-mut-item">` +
        `<span class="fc-pal-mutagen ${MCLS[m]||'fc-mutagen-ji'}">${m}</span>` +
        `<span class="fc-mut-palace">${pname}</span>` +
        `<span class="fc-mut-star">（${sname}）</span>` +
      `</div>`
    );
    mutDistEl.innerHTML = mutItems.length
      ? `<div class="fc-mut-title">生年四化</div><div class="fc-mut-list">${mutItems.join('')}</div>`
      : '';
  }

  fcBuildYearCards(_fcBirthYear);
  fcLoadYearly(_fcBirthYear + _fcActiveAge - 1); // 虚岁N → 出生年+N-1

  document.getElementById('fc-c-xiantian').textContent = '风水涣';
  document.getElementById('fc-c-houtian').textContent  = '水天需';
  const _initPalaceName = _fcXiaoLianBranch
    ? (_chart?.palaces?.find(p => p.earthlyBranch === _fcXiaoLianBranch)?.name || '') : '';
  document.getElementById('fc-c-liunian').textContent  =
    `${_fcActiveAge}岁（${_fcBirthYear + _fcActiveAge - 1}年）${_initPalaceName ? ' · 小限' + _initPalaceName : ''}`;

  _fcActiveBranch = lifeBranch || '卯';
  renderFigmaHighlight(_fcActiveBranch);

  _fcActiveTab = '先天卦';
  fcRenderTabs();
  fcRenderLiunianScroll();
  fcRenderHexagram();

  document.querySelectorAll('.fc-tab').forEach(btn => {
    btn.onclick = () => {
      _fcActiveTab = btn.dataset.tab;
      fcRenderTabs();
      fcRenderHexagram();
      renderFigmaHighlight(_fcActiveBranch);
    };
  });
  const scrollEl = document.getElementById('fc-liunian-scroll');
  document.getElementById('fc-scroll-left').onclick  = () => scrollEl.scrollBy({left:-90,behavior:'smooth'});
  document.getElementById('fc-scroll-right').onclick = () => scrollEl.scrollBy({left: 90,behavior:'smooth'});
}

// ─── AI 解盘引擎 ──────────────────────────────────────────
function buildAnalysis(chart, inputs) {
  const palaces = chart.palaces || [];
  const byName  = {};
  palaces.forEach(p => { if (p.name) byName[p.name.replace('宫','')] = p; });

  const life   = byName['命']  || byName['命宫'];
  const career = byName['官禄'];
  const wealth = byName['财帛'];
  const love   = byName['夫妻'];

  // allStarsOf：主星 + 辅星（文昌/文曲/左辅/右弼部分年干有生年四化）
  const allStarsOf = p => [...(p?.majorStars||[]), ...(p?.minorStars||[])];
  const majorOf  = p => (p?.majorStars || []).map(s => s.name);
  const mutagenOf= p => allStarsOf(p).filter(s => s.mutagen)
                          .map(s => `${s.name}${s.mutagen}`);
  const hasMinor = (p, n) => (p?.minorStars || []).some(s => (s.name||'').includes(n));

  const lifeMaj  = majorOf(life);
  const lifeData = STARS[lifeMaj[0]];

  // 生年四化：格式 "宫位化XX（星名）"，含辅星（文昌/文曲/左辅/右弼）
  const allMutagen = palaces.flatMap(p =>
    allStarsOf(p).filter(s=>s.mutagen).map(s=>`${p.name}${s.mutagen}（${s.name}）`)
  );

  const gender = (inputs?.gender === 'male') ? '男命' : '女命';
  let overview = `${chart.zodiac || ''}年生，${chart.fiveElementsClass || ''}，${gender}。`;
  if (lifeMaj.length) {
    overview += `命宫主星${lifeMaj.join('+')}，${lifeData?.trait || '命格特殊'}。`;
  } else {
    overview += '命宫空宫，性格受三方星曜影响深，适应性强但需培养主见。';
  }
  if (allMutagen.length) overview += `生年四化：${allMutagen.join('、')}。`;

  let personality = lifeData
    ? `命宫${lifeMaj[0]}：${lifeData.trait}。`
    : '命宫空宫，性格多元，受大运影响明显。';
  if (hasMinor(life,'左辅') || hasMinor(life,'右弼')) personality += '命有辅弼，贵人缘强。';
  if (hasMinor(life,'文昌') || hasMinor(life,'文曲')) personality += '文昌/文曲入命，聪颖有文艺才华。';
  const lifeJi = allStarsOf(life).find(s=>s.mutagen?.includes('忌'));
  if (lifeJi && lifeData) personality += `命宫化忌（${lifeJi.name}），注意：${lifeData.risk}。`;

  const careerMaj = majorOf(career);
  let careerText = careerMaj.length && STARS[careerMaj[0]]
    ? `官禄宫主星${careerMaj[0]}：${STARS[careerMaj[0]].career}。`
    : '官禄宫空宫，事业方向宜参考命宫与迁移宫综合判断。';
  if (mutagenOf(career).some(m=>m.includes('化禄'))) careerText += '官禄宫化禄，事业运旺，宜主动推进。';
  if (mutagenOf(career).some(m=>m.includes('化忌'))) careerText += '官禄宫化忌，事业有阻，宜稳健行事。';
  if (lifeData) careerText += `结合命格：${lifeData.career}。`;

  const wealthMaj = majorOf(wealth);
  let wealthText = wealthMaj.length && STARS[wealthMaj[0]]
    ? `财帛宫主星${wealthMaj[0]}：${STARS[wealthMaj[0]].wealth}。`
    : '财帛宫空宫，财运宜看官禄宫与命宫综合判断。';
  if (mutagenOf(wealth).some(m=>m.includes('化禄'))) wealthText += '财帛宫化禄，进财机会旺。';
  if (mutagenOf(wealth).some(m=>m.includes('化忌'))) wealthText += '财帛宫化忌，注意防漏财或冲动消费。';
  if (hasMinor(wealth,'禄存')) wealthText += '禄存入财帛，财库稳固，善于守财。';

  const loveMaj = majorOf(love);
  let loveText = loveMaj.length && STARS[loveMaj[0]]
    ? `夫妻宫主星${loveMaj[0]}：${STARS[loveMaj[0]].love}。`
    : '夫妻宫空宫，感情缘分受对宫影响，需主动经营。';
  if (mutagenOf(love).some(m=>m.includes('化禄'))) loveText += '夫妻宫化禄，感情缘分好，易遇良缘。';
  if (mutagenOf(love).some(m=>m.includes('化忌'))) loveText += '夫妻宫化忌，感情需格外用心，防误解争执。';

  const jiAll = palaces.flatMap(p =>
    allStarsOf(p).filter(s=>s.mutagen?.includes('忌')).map(s=>`${p.name}化忌（${s.name}）`)
  );
  let risks = jiAll.length
    ? `本命化忌落在：${jiAll.join('、')}，这些宫位领域容易遇阻，需特别谨慎。`
    : '本命无明显化忌，整体命盘较顺，但仍需关注大限流年变化。';
  if (lifeData) risks += lifeData.risk ? `命格弱点：${lifeData.risk}。` : '';

  const star0 = lifeMaj[0] || '';
  let advice = '';
  if (['紫微','天府','天相'].includes(star0))
    advice = '命格偏守成稳健，宜专注深耕一个领域，不急求变，贵在积累。';
  else if (['破军','七杀','贪狼'].includes(star0))
    advice = '命格偏开创进取，宜主动出击开拓新领域，切忌守旧，但需防冲动损失。';
  else if (['太阳','武曲','廉贞'].includes(star0))
    advice = '命格事业心旺，适合全力投入事业，但注意勿忽略健康与感情关系。';
  else if (['天机','巨门','太阴'].includes(star0))
    advice = '命格偏思虑型，擅长分析谋划，宜发挥专业才华，减少过度思虑带来的犹豫。';
  else
    advice = '命格中正，宜发挥自身优势，扬长避短，在擅长领域持续深耕。';
  advice += ' 流年运势受大限影响，建议结合当前大限主星综合判断每年节奏。';

  return { overview, personality, career: careerText, wealth: wealthText, love: loveText, risks, advice };
}

// ─── 渲染分析报告 ─────────────────────────────────────────
function renderAnalysis(r) {
  const lifeMaj = _chart ? (_chart.palaces||[])
    .find(p=>p.name==='命宫')?.majorStars?.map(s=>s.name)||[] : [];

  const subTitle = document.getElementById('analysis-sub-title');
  if (subTitle) subTitle.textContent =
    `${_chart?.zodiac||''}年 · ${_chart?.fiveElementsClass||''} · 命宫${lifeMaj[0]||'空宫'}`;
  const anOverview = document.getElementById('an-overview');
  if (anOverview) anOverview.textContent    = r.overview;
  const anPersonality = document.getElementById('an-personality');
  if (anPersonality) anPersonality.textContent = r.personality;
  const anCareer = document.getElementById('an-career');
  if (anCareer) anCareer.textContent      = r.career;
  const anWealth = document.getElementById('an-wealth');
  if (anWealth) anWealth.textContent      = r.wealth;
  const anLove = document.getElementById('an-love');
  if (anLove) anLove.textContent        = r.love;
  const anRisks = document.getElementById('an-risks');
  if (anRisks) anRisks.textContent       = r.risks;
  const anAdvice = document.getElementById('an-advice');
  if (anAdvice) anAdvice.textContent      = r.advice;
}

// ─── 工具函数 ─────────────────────────────────────────────
function setLoading(on) {
  document.getElementById('btn-text').style.display    = on ? 'none' : 'inline';
  document.getElementById('btn-loading').style.display = on ? 'inline' : 'none';
  document.getElementById('btn-submit').disabled = on;
}
function showError(msg) {
  const el = document.getElementById('form-error');
  el.textContent = msg; el.style.display = 'block';
}
function hideError() {
  document.getElementById('form-error').style.display = 'none';
}
</script>
