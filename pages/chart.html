<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>紫微斗数 · 免费排盘</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/chart.css">
</head>
<body>

  <header class="navbar">
    <div class="nav-inner">
      <a href="../index.html" class="nav-logo"><span class="logo-star">☽</span> 紫微斗数</a>
      <nav class="nav-links">
        <a href="../index.html">首页</a>
        <a href="chart.html" class="active">免费排盘</a>
      </nav>
    </div>
  </header>

  <!-- 表单区 -->
  <section class="form-section">
    <div class="section-inner">
      <div class="form-header">
        <h1>免费紫微斗数排盘</h1>
        <p>填入出生信息，系统自动生成你的十二宫命盘，无需注册，结果即时呈现。</p>
      </div>

      <form id="chart-form" class="chart-form" novalidate>
        <div class="form-grid">

          <div class="form-group">
            <label for="inp-year">出生年份</label>
            <input type="number" id="inp-year" min="1900" max="2030"
                   placeholder="如：1990" autocomplete="off">
          </div>

          <div class="form-group">
            <label for="inp-month">出生月份</label>
            <select id="inp-month">
              <option value="">选择月份</option>
              <option value="1">1 月</option><option value="2">2 月</option>
              <option value="3">3 月</option><option value="4">4 月</option>
              <option value="5">5 月</option><option value="6">6 月</option>
              <option value="7">7 月</option><option value="8">8 月</option>
              <option value="9">9 月</option><option value="10">10 月</option>
              <option value="11">11 月</option><option value="12">12 月</option>
            </select>
          </div>

          <div class="form-group">
            <label for="inp-day">出生日</label>
            <select id="inp-day">
              <option value="">选择日期</option>
              <!-- generated by JS -->
            </select>
          </div>

          <div class="form-group">
            <label for="inp-time">出生时辰</label>
            <select id="inp-time">
              <option value="-1">不知道时辰（默认午时）</option>
              <option value="0">子时　23:00 – 01:00</option>
              <option value="1">丑时　01:00 – 03:00</option>
              <option value="2">寅时　03:00 – 05:00</option>
              <option value="3">卯时　05:00 – 07:00</option>
              <option value="4">辰时　07:00 – 09:00</option>
              <option value="5">巳时　09:00 – 11:00</option>
              <option value="6">午时　11:00 – 13:00</option>
              <option value="7">未时　13:00 – 15:00</option>
              <option value="8">申时　15:00 – 17:00</option>
              <option value="9">酉时　17:00 – 19:00</option>
              <option value="10">戌时　19:00 – 21:00</option>
              <option value="11">亥时　21:00 – 23:00</option>
            </select>
          </div>

          <div class="form-group">
            <label>性别</label>
            <div class="gender-row">
              <button type="button" class="gender-btn active" data-v="male">男</button>
              <button type="button" class="gender-btn" data-v="female">女</button>
              <input type="hidden" id="inp-gender" value="male">
            </div>
          </div>

        </div>

        <div id="form-error" class="form-error" style="display:none"></div>

        <button type="submit" class="btn-submit" id="btn-submit">
          <span id="btn-text">开 始 排 盘</span>
          <span id="btn-loading" style="display:none">排盘中…</span>
        </button>
      </form>

      <p class="form-note">数据仅在本地浏览器运算，不上传，不储存。</p>
    </div>
  </section>

  <!-- 结果区（初始隐藏） -->
  <section id="chart-result" class="chart-result-section" style="display:none">
    <div class="section-inner">

      <!-- 命盘基本信息条 -->
      <div class="result-meta" id="result-meta"></div>

      <!-- 时辰未知提示 -->
      <div class="time-warn" id="time-warn" style="display:none">
        ⚠ 时辰未知：命宫位置基于默认午时估算，实际命宫可能不同。
      </div>

      <!-- 命盘网格 -->
      <div class="chart-board-wrap">
        <div class="palace-grid">
          <!-- 第1行 巳 午 未 申 -->
          <div class="palace-cell" id="p-si"></div>
          <div class="palace-cell" id="p-wu"></div>
          <div class="palace-cell" id="p-wei"></div>
          <div class="palace-cell" id="p-shen"></div>

          <!-- 第2行 辰 [中心] 酉 -->
          <div class="palace-cell" id="p-chen"></div>
          <div class="chart-center" id="chart-center">
            <div class="cc-zodiac"   id="cc-zodiac"></div>
            <div class="cc-date"     id="cc-date"></div>
            <div class="cc-row"><span class="cc-label">五行局</span><span id="cc-five"></span></div>
            <div class="cc-row"><span class="cc-label">命主</span><span id="cc-soul"></span></div>
            <div class="cc-row"><span class="cc-label">身主</span><span id="cc-body"></span></div>
            <div class="cc-row"><span class="cc-label">命宫</span><span id="cc-life-branch"></span></div>
          </div>
          <div class="palace-cell" id="p-you"></div>

          <!-- 第3行 卯 [中心] 戌 -->
          <div class="palace-cell" id="p-mao"></div>
          <div class="palace-cell" id="p-xu"></div>

          <!-- 第4行 寅 丑 子 亥 -->
          <div class="palace-cell" id="p-yin"></div>
          <div class="palace-cell" id="p-chou"></div>
          <div class="palace-cell" id="p-zi"></div>
          <div class="palace-cell" id="p-hai"></div>
        </div>
      </div>

      <!-- 图例 -->
      <div class="chart-legend">
        <span><span class="star star-major demo">紫微</span> 主星</span>
        <span><span class="star star-minor demo">左辅</span> 辅星</span>
        <span><span class="mutagen-badge demo">化禄</span> 四化</span>
        <span class="legend-body-tip"><span class="badge-body">身</span> 身宫</span>
      </div>

      <!-- 再排一次 -->
      <div style="text-align:center;margin-top:32px">
        <button class="btn-ghost" onclick="document.getElementById('chart-result').style.display='none';window.scrollTo({top:0,behavior:'smooth'})">
          重新排盘
        </button>
      </div>
    </div>
  </section>

  <footer class="footer">
    <div class="footer-inner">
      <span>© 2026 紫微斗数在线排盘</span>
      <span>排盘算法基于 <a href="https://github.com/SylarLong/iztro" target="_blank" style="color:var(--gold)">iztro</a>（MIT 许可）</span>
    </div>
  </footer>

  <script type="module">
  // ─── 归因 ───────────────────────────────────────────────
  // 排盘算法使用开源库 iztro by SylarLong（MIT License）
  // https://github.com/SylarLong/iztro
  // 通过 esm.sh CDN 在浏览器中直接引用，无需后端。
  // ────────────────────────────────────────────────────────

  // 地支 → 宫格 ID 映射
  const BRANCH_ID = {
    '子':'p-zi','丑':'p-chou','寅':'p-yin','卯':'p-mao',
    '辰':'p-chen','巳':'p-si','午':'p-wu','未':'p-wei',
    '申':'p-shen','酉':'p-you','戌':'p-xu','亥':'p-hai'
  };

  // 生成日期选项
  const dayEl = document.getElementById('inp-day');
  for (let d = 1; d <= 31; d++) {
    const o = document.createElement('option');
    o.value = d; o.textContent = d + ' 日';
    dayEl.appendChild(o);
  }

  // 性别切换
  document.querySelectorAll('.gender-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.gender-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('inp-gender').value = btn.dataset.v;
    });
  });

  // ─── 表单提交 ────────────────────────────────────────────
  document.getElementById('chart-form').addEventListener('submit', async (e) => {
    e.preventDefault();

    const year   = document.getElementById('inp-year').value.trim();
    const month  = document.getElementById('inp-month').value;
    const day    = document.getElementById('inp-day').value;
    let   timeIdx = parseInt(document.getElementById('inp-time').value);
    const gender = document.getElementById('inp-gender').value;

    // 校验
    if (!year || !month || !day) {
      showError('请填写完整的出生年、月、日'); return;
    }
    if (parseInt(year) < 1900 || parseInt(year) > 2030) {
      showError('出生年份请填写 1900 – 2030 之间的数字'); return;
    }

    const unknownTime = timeIdx < 0;
    if (unknownTime) timeIdx = 6; // 默认午时

    const dateStr = `${year}-${String(month).padStart(2,'0')}-${String(day).padStart(2,'0')}`;

    setLoading(true);
    hideError();

    try {
      // 动态加载 iztro（首次加载后浏览器会缓存）
      const mod = await import('https://esm.sh/iztro@2');
      const astroLib = mod.astro || mod.default?.astro;

      if (!astroLib) throw new Error('iztro 模块结构不匹配，请刷新重试');

      // 兼容不同版本的方法名
      let chart;
      if (typeof astroLib.bySolar === 'function') {
        chart = astroLib.bySolar(dateStr, timeIdx, gender === 'male' ? '男' : '女', true);
      } else if (typeof astroLib.astrolabeBySolarDate === 'function') {
        chart = astroLib.astrolabeBySolarDate(dateStr, timeIdx, gender, true);
      } else {
        throw new Error('无法找到排盘方法，请刷新重试');
      }

      renderChart(chart, unknownTime, gender, dateStr);
      document.getElementById('chart-result').style.display = 'block';
      document.getElementById('chart-result').scrollIntoView({ behavior: 'smooth' });

    } catch (err) {
      showError('排盘失败：' + (err.message || '请检查出生日期是否正确，或刷新页面重试'));
      console.error(err);
    } finally {
      setLoading(false);
    }
  });

  // ─── 渲染命盘 ────────────────────────────────────────────
  function renderChart(chart, unknownTime, gender, dateStr) {
    // 清空旧数据
    Object.values(BRANCH_ID).forEach(id => {
      const el = document.getElementById(id);
      if (el) { el.innerHTML = ''; el.className = 'palace-cell'; }
    });

    // 中心信息
    document.getElementById('cc-zodiac').textContent = chart.zodiac || '';
    document.getElementById('cc-date').textContent   = chart.chineseDate || chart.lunarDate || '';
    document.getElementById('cc-five').textContent   = chart.fiveElementsClass || '—';
    document.getElementById('cc-soul').textContent   = chart.soul || '—';
    document.getElementById('cc-body').textContent   = chart.body || '—';
    document.getElementById('cc-life-branch').textContent = chart.earthlyBranchOfSoulPalace || '—';

    // 基本信息条
    const genderLabel = gender === 'male' ? '男命' : '女命';
    document.getElementById('result-meta').textContent =
      `公历 ${dateStr} · ${genderLabel} · ${chart.sign || ''}`;

    // 时辰未知提示
    document.getElementById('time-warn').style.display = unknownTime ? 'block' : 'none';

    // 填宫
    const palaces = chart.palaces || [];
    palaces.forEach(p => {
      const id = BRANCH_ID[p.earthlyBranch];
      if (!id) return;
      const cell = document.getElementById(id);
      if (!cell) return;

      const isLife = p.name === '命宫' || p.name === '命';
      const isBody = !!p.isBodyPalace;

      // 主星
      const majorHtml = (p.majorStars || []).map(s => {
        const m = s.mutagen
          ? `<span class="mutagen-badge">${s.mutagen}</span>` : '';
        const bright = s.brightness
          ? `<span class="star-bright">${s.brightness}</span>` : '';
        return `<span class="star star-major">${s.name}${bright}${m}</span>`;
      }).join('');

      // 辅星（最多显示 6 颗）
      const minorHtml = (p.minorStars || []).slice(0, 6).map(s =>
        `<span class="star star-minor">${s.name}</span>`
      ).join('');

      // 大限起止年龄
      const stageHtml = p.decadal
        ? `<span class="palace-stage">${p.decadal.range?.[0] || ''}–${p.decadal.range?.[1] || ''}</span>` : '';

      cell.innerHTML = `
        <div class="palace-head">
          <span class="palace-name">${p.name || ''}${isBody ? '<span class="badge-body">身</span>' : ''}</span>
          <span class="palace-stem-branch">${(p.heavenlyStem || '')}${p.earthlyBranch || ''}</span>
        </div>
        ${stageHtml}
        <div class="palace-major">${majorHtml}</div>
        <div class="palace-minor">${minorHtml}</div>
      `;

      if (isLife) cell.classList.add('is-life');
      if (isBody) cell.classList.add('is-body');
    });
  }

  function setLoading(on) {
    document.getElementById('btn-text').style.display    = on ? 'none'  : 'inline';
    document.getElementById('btn-loading').style.display = on ? 'inline' : 'none';
    document.getElementById('btn-submit').disabled = on;
  }
  function showError(msg) {
    const el = document.getElementById('form-error');
    el.textContent = msg; el.style.display = 'block';
  }
  function hideError() {
    document.getElementById('form-error').style.display = 'none';
  }
  </script>

</body>
</html>
