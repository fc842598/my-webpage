<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的网页</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: "Microsoft YaHei", sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 48px 56px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
      max-width: 480px;
      width: 90%;
    }

    h1 {
      font-size: 2rem;
      color: #333;
      margin-bottom: 12px;
    }

    p {
      color: #666;
      font-size: 1rem;
      line-height: 1.7;
      margin-bottom: 28px;
    }

    button {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      border: none;
      padding: 12px 32px;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(102,126,234,0.4);
    }

    #msg {
      margin-top: 20px;
      font-size: 0.95rem;
      color: #764ba2;
      min-height: 24px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>你好，世界！</h1>
    <p>这是一个简单的网页示例。<br>点击下面的按钮试试看。</p>
    <button onclick="greet()">点击我</button>
    <div id="msg"></div>
  </div>

  <script>
    const messages = [
      "Hello World!",
      "欢迎来到我的网页 👋",
      "今天也是美好的一天！",
      "你好！",
      "Keep going! 🚀"
    ];
    let i = 0;
    function greet() {
      document.getElementById("msg").textContent = messages[i % messages.length];
      i++;
    }
  </script>
</body>
</html>
